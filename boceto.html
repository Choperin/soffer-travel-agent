.rest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px}
.rest-card{padding:16px}
.rest-name{font-weight:600;font-size:.88rem;color:var(--text)}
.rest-type{font-size:.82rem;color:var(--text-muted);margin:4px 0}
.rest-note{font-size:.8rem;color:var(--text-faint);margin-top:6px;line-height:1.5}
.rest-link{display:inline-block;margin-top:8px;font-size:.8rem;color:var(--primary);font-weight:500}
.rest-link:hover{color:var(--primary-hover)}
.rest-city-header{font-family:var(--font-display);font-size:1.15rem;margin:24px 0 12px;color:var(--text)}
@media(max-width:700px){
.hero{height:85vh}
.hero h1{font-size:2.2rem}
.hero-content{padding:32px 16px 32px}
.weather-grid{grid-template-columns:repeat(2,1fr)}
.hotel-card{flex-direction:column}
.hotel-img-wrap{width:100%;min-height:140px;height:160px;max-height:160px}
.flight-card{grid-template-columns:1fr;gap:8px}
.flight-price-col{text-align:left}
.flight-times{text-align:left;min-width:auto;display:flex;align-items:center;gap:6px}
.action-bar{flex-direction:column}
.btn{width:100%;justify-content:center}
.reserve-table,.reserve-table thead,.reserve-table tbody,.reserve-table th,.reserve-table td,.reserve-table tr{display:block;width:100%}
.reserve-table thead{display:none}
.reserve-table tr{margin-bottom:16px;padding:12px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius)}
.reserve-table td{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.reserve-table td:last-child{border-bottom:none}
.reserve-table td::before{content:attr(data-label);font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);flex-shrink:0;margin-right:12px}
.modal{padding:24px 20px}
.modal-actions{flex-direction:column}
.modal-actions .btn{width:100%;justify-content:center}
}

<header class="hero">
 <img class="hero-img" src="{{HERO_IMAGE_URL}}" alt="{{HERO_IMAGE_ALT}}">
 <div class="hero-overlay"></div>
 <div class="hero-content">

<main class="main">

 <!-- {{BOCETO_SECTIONS}} — Secciones obligatorias (orden fijo):

 1. Vuelos      id="vuelos"       — ida/vuelta separados, 3 tarifas c/u
 2. Auto        id="auto"         — si aplica
 3. Hoteles     id="hoteles"      — 3 opciones/ciudad, CON FOTO cada uno
 4. Actividades id="actividades"  — por día, con foto en featured
 5. Restaurantes id="restaurantes" — grid por ciudad, 3-5 por ciudad
 6. Clima       id="clima"        — cards por ciudad
 7. Alertas     id="alertas"      — info-box con lista
 8. Presupuesto id="presupuesto"  — tabla con total dinámico
 9. Reservas    id="reservas"     — tabla prioridad + links

 HOTEL CON FOTO (patrón obligatorio):
 <div class="card hotel-card" data-group="hotel-[ciudad]" onclick="selectHotel(this)">
   <div class="hotel-img-wrap">
     <img class="hotel-img" src="{{HOTEL_PHOTO_URL}}" alt="{{HOTEL_NAME}}">
   </div>
   <div class="hotel-body">
     <div class="hotel-name"><span class="radio-dot"></span> {{HOTEL_NAME}} <span class="hotel-rating">{{STARS}} · {{SCORE}}</span></div>
     <div class="hotel-desc">{{UBICACION}} · {{DESCRIPCION}}</div>
     <div class="hotel-amenities">{{AMENITY_TAGS}}</div>
     <div class="hotel-bottom">{{PRECIOS}} {{LINK}}</div>
   </div>
 </div>

 HOTEL CUMPLEAÑOS (birthday — agrega bday-banner DENTRO de hotel-card):
 <div class="card hotel-card birthday" ...>
   <div class="bday-banner">{{BDAY_MESSAGE}}</div>
   <div class="hotel-img-wrap">...</div>
   <div class="hotel-body">...</div>
 </div>

 ACTIVIDAD CON FOTO (featured — layout vertical):
 <div class="card act-card featured" onclick="toggleCheck(this)" style="flex-direction:column;gap:0;padding:0;overflow:hidden">
   <img src="{{ACTIVITY_PHOTO_URL}}" alt="{{ACT_NAME}}" style="width:100%;height:120px;object-fit:cover;border-radius:8px 8px 0 0;display:block">
   <div style="display:flex;align-items:center;gap:14px;padding:13px 16px">
     <div class="check-box"></div>
     <div class="act-body">{{ACT_CONTENT}}</div>
     <div class="act-price">{{ACT_PRICE}}</div>
   </div>
 </div>

 RESTAURANTE (patrón obligatorio — card dentro de rest-grid):
 <h3 class="rest-city-header">{{CIUDAD}}</h3>
 <div class="rest-grid">
   <div class="card rest-card">
     <div class="rest-name">{{NOMBRE}} <span class="featured-badge">{{BADGE}}</span></div>
     <div class="rest-type">{{TIPO}} · {{ZONA}} · {{PRECIO_PP}}</div>
     <div class="rest-note">{{DESCRIPCION}}</div>
     <a href="{{URL}}" target="_blank" rel="noopener noreferrer" class="rest-link">Reservar</a>
   </div>
 </div>

 INTERACTIVIDAD:
 VUELOS:       onclick="selectFlight(this)" + data-group="[ruta]"
 HOTELES:      onclick="selectHotel(this)"  + data-group="hotel-[ciudad]"
 ACTIVIDADES:  onclick="toggleCheck(this)"

 REGLAS CRÍTICAS:
 - CADA hotel DEBE tener foto real (hotel-img-wrap + hotel-img)
 - CADA actividad featured DEBE tener foto real
 - Restaurantes son sección SEPARADA de actividades (id="restaurantes")
 - Min 3 restaurantes por ciudad, min 1 con badge Michelin si existe
 - Hotel birthday: bday-banner es compacto (max 1 línea de texto)
 -->

</main>

 <p style="font-size:12px;color:var(--text-faint);margin-top:4px"><a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a></p>

<script>
(function(){
 'use strict';
 var pills=document.querySelectorAll('.nav-pill');
 var sections=[];
 pills.forEach(function(p){var t=document.querySelector(p.getAttribute('href'));if(t)sections.push({el:t,pill:p});});
 function updateActive(){var scrollY=window.scrollY+80,active=sections[0];sections.forEach(function(s){if(s.el.offsetTop<=scrollY)active=s;});pills.forEach(function(p){p.classList.remove('active');});if(active)active.pill.classList.add('active');}
 window.addEventListener('scroll',updateActive,{passive:true});
 updateActive();
 pills.forEach(function(p){p.addEventListener('click',function(e){e.preventDefault();var t=document.querySelector(this.getAttribute('href'));if(t)t.scrollIntoView({behavior:'smooth'});});});
 window.selectFlight=function(card){var g=card.getAttribute('data-group');document.querySelectorAll('.card[data-group="'+g+'"]').forEach(function(s){s.classList.remove('selected');});card.classList.add('selected');};
 window.selectHotel=function(card){var g=card.getAttribute('data-group');document.querySelectorAll('.card[data-group="'+g+'"]').forEach(function(s){s.classList.remove('selected');});card.classList.add('selected');};
 window.toggleCheck=function(card){var box=card.querySelector('.check-box');if(box){box.classList.toggle('checked');card.classList.toggle('selected');}};
})();
</script>

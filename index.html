<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajes Soffer - Familia Soffer</title>
    <meta name="description" content="Portal de viajes premium para la Familia Soffer. Tu agente de viajes de confianza.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared-styles.css">
    <style>
        /* Estilos específicos del portal - ver archivo adjunto template-portal-viajes-5.html */
    </style>
    <script src="js/config.js"></script>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <div class="nav-logo">
                <svg class="nav-logo-icon" viewBox="0 0 28 28" fill="none" aria-hidden="true">
                    <circle cx="14" cy="14" r="12.5" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="14" cy="14" r="2" fill="currentColor"/>
                    <path d="M14 4v3M14 21v3M4 14h3M21 14h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
                Viajes Soffer
            </div>
            <button class="theme-toggle" aria-label="Cambiar tema" onclick="toggleTheme()">
                <svg class="icon-sun" viewBox="0 0 20 20" fill="none">
                    <circle cx="10" cy="10" r="3.5" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M10 2.5v2M10 15.5v2M2.5 10h2M15.5 10h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                </svg>
                <svg class="icon-moon" viewBox="0 0 20 20" fill="none">
                    <path d="M17.1 12.6A7.5 7.5 0 017.4 2.9a7.5 7.5 0 109.7 9.7z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </nav>

    <section class="hero">
        <h1 class="hero-title">Nuestros Viajes</h1>
        <p class="hero-subtitle">Familia Soffer · Agente de Viajes Premium</p>
    </section>

    <main class="grid-section">
        <div class="grid" id="tripGrid">
            <!-- CTA Solicitar Viaje -->
            <a href="https://choperin.github.io/soffer-travel-agent/solicitud.html" class="card card--cta" style="text-decoration:none">
                <svg class="card--cta-icon" viewBox="0 0 56 56" fill="none" aria-hidden="true">
                    <circle cx="28" cy="28" r="24" stroke="currentColor" stroke-width="1.8" stroke-dasharray="4 3"/>
                    <path d="M28 18v20M18 28h20" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
                <div class="card--cta-title">Solicitar Viaje</div>
                <div class="card--cta-subtitle">Planifica tu próximo destino con tu agente premium</div>
            </a>
        </div>
    </main>

    <footer class="footer">
        <p class="footer-text">Tu Agente de Viajes Premium · Familia Soffer</p>
        <p class="footer-credit"><a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a></p>
    </footer>

    <script src="js/supabase-client.js"></script>
    <script>
        // Cargar viajes desde Supabase y renderizar
        async function loadTrips() {
            try {
                const trips = await supabase.getTrips();
                console.log('Viajes cargados:', trips);
                // Por ahora solo mostramos el CTA
                // En Fase 3 renderizaremos las tarjetas dinámicamente
            } catch (error) {
                console.error('Error cargando viajes:', error);
            }
        }

        // Dark mode toggle
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
        }

        // Cargar viajes al iniciar
        loadTrips();
    </script>
</body>
</html>

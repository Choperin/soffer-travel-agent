<script>
(function () {
  'use strict';

  function formatDateRange(datestart, dateend) {
    if (!datestart || !dateend) return '';
    const start = new Date(datestart);
    const end = new Date(dateend);

    const meses = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];

    const diaIni = start.getDate();
    const mesIni = meses[start.getMonth()];
    const diaFin = end.getDate();
    const mesFin = meses[end.getMonth()];
    const anio = start.getFullYear();

    if (start.getMonth() === end.getMonth()) {
      return `${diaIni}–${diaFin} ${mesIni} ${anio}`;
    } else {
      return `${diaIni} ${mesIni} – ${diaFin} ${mesFin} ${anio}`;
    }
  }

  function statusBadge(trip) {
    const status = trip.tripstatus; // reservado, boceto_pre, etc.
    if (status === 'reservado') {
      return '<span class="badge badge--confirmado">Confirmado</span>';
    }
    if (status === 'boceto_pre') {
      return '<span class="badge badge--planeacion">En planeación</span>';
    }
    if (status === 'boceto_post') {
      return '<span class="badge badge--en-reserva">En reserva</span>';
    }
    if (status === 'completado') {
      return '<span class="badge badge--completado">Completado</span>';
    }
    return '<span class="badge badge--planeacion">En planeación</span>';
  }
  function getBocetoBadge(trip) {
    const status = trip.tripstatus;
    if (status === 'boceto_pre') {
      return 'En edición';
    }
    if (status === 'boceto_post' || status === 'reservado' || status === 'completado') {
      return '✓ Confirmado';
    }
    return 'Pendiente';
  }

  async function checkItinerarioStatus(trip) {
    // Solo revisar si está en estado "reservado"
    if (trip.tripstatus !== 'reservado') return;

    try {
      const reservations = await supabase.getReservations(trip.tripid);
      const allConfirmed = reservations.every(r => r.reservationstatus === 'confirmado');

      if (allConfirmed && reservations.length > 0) {
        // Desbloquear itinerario
        const link = document.getElementById(`itinerarioLink-${trip.tripid}`);
        const badge = document.getElementById(`itinerarioBadge-${trip.tripid}`);

        if (link && badge) {
          link.classList.remove('submenu__item--locked');
          link.style.pointerEvents = 'auto';
          link.target = '_blank';
          link.rel = 'noopener noreferrer';

          badge.classList.remove('submenu__badge--locked');
          badge.classList.add('submenu__badge--completed');
          badge.textContent = '✓ Listo';
        }
      }
    } catch (error) {
      console.error('Error checking itinerario status:', error);
    }
  }

  function formatPrice(mxn) {
    if (mxn == null) return '';
    return mxn.toLocaleString('es-MX', { style: 'currency', currency: 'MXN', maximumFractionDigits: 0 });
  }

  function createTripCard(trip) {
    const grid = document.getElementById('tripGrid');
    if (!grid) return;

    const card = document.createElement('article');
       card.className = 'card';
    card.style.cursor = 'pointer';
    card.onclick = function (event) {
      // No expandir si se hace click en un link del submenú
      if (event.target.closest('.submenu__item')) return;
      // Toggle expansión
      card.classList.toggle('is-expanded');
    };


    const fechas = formatDateRange(trip.datestart, trip.dateend);
    const destino = trip.destination || 'Viaje';
    const region = trip.region ? ` · ${trip.region}` : '';
    const tipo = trip.triptype || '';
    const priceMXN = formatPrice(trip.total_estimate_mxn);

       card.innerHTML = `
      <div class="card__body" style="padding:16px 18px 18px 18px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div>
            <h2 class="card__destination" style="margin-bottom:4px;">${destino}${region}</h2>
            <div class="card__row" style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);">
              <span>${fechas}</span>
              ${tipo ? `<span style="opacity:.7">· ${tipo}</span>` : ''}
            </div>
          </div>
          <div style="text-align:right">
            <div id="statusBadge-${trip.tripid}">
              ${statusBadge(trip)}
            </div>
          </div>
        </div>
        <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:flex-end;">
          <div style="font-size:12px;color:var(--text-muted);max-width:60%;">
            ${trip.travelers_summary ? trip.travelers_summary : ''}
          </div>
          <div class="card__price" style="text-align:right;">
            ${priceMXN ? `<div class="card__price-main" style="font-weight:600;font-size:14px;">${priceMXN}</div>` : ''}
          </div>
        </div>
      </div>

      <!-- Submenú expandible -->
      <div class="card__submenu">
        <div class="submenu">
          <!-- Boceto -->
          <a href="boceto.html?slug=${trip.slug}" target="_blank" rel="noopener noreferrer" 
             class="submenu__item" onclick="event.stopPropagation()">
            <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M2 13.5V16h2.5L13.06 7.44l-2.5-2.5L2 13.5z" stroke="currentColor" stroke-width="1.3"/>
            </svg>
            <span class="submenu__name">Boceto</span>
            <span class="submenu__badge submenu__badge--active" id="bocetoBadge-${trip.tripid}">${getBocetoBadge(trip)}</span>
          </a>
          
          <!-- Panel de Reservas -->
          <a href="panel-reservas.html?trip=${trip.tripid}" target="_blank" rel="noopener noreferrer" 
             class="submenu__item" onclick="event.stopPropagation()">
            <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/>
            </svg>
            <span class="submenu__name">Panel de Reservas</span>
            <span class="submenu__badge submenu__badge--active" id="panelBadge-${trip.tripid}">En proceso</span>
          </a>
          
          <!-- Itinerario (bloqueado) -->
          <a href="itinerario.html?trip=${trip.tripid}" id="itinerarioLink-${trip.tripid}"
             class="submenu__item submenu__item--locked" style="pointer-events: none;" 
             onclick="event.stopPropagation()">
            <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M3 4l4 2v10l-4-2V4z" stroke="currentColor" stroke-width="1.3"/>
            </svg>
            <span class="submenu__name">Itinerario</span>
            <span class="submenu__badge submenu__badge--locked" id="itinerarioBadge-${trip.tripid}">🔒 Bloqueado</span>
          </a>
        </div>
      </div>
    `;

    // Insertar la tarjeta antes del CTA "Solicitar viaje"
    const cta = grid.querySelector('.card--cta');
    if (cta) {
      grid.insertBefore(card, cta);
    } else {
      grid.appendChild(card);
        }
        // Verificar estado de itinerario
    checkItinerarioStatus(trip);

  }

  async function loadTrips() {
    try {
      const trips = await supabase.getTrips();
      console.log('✅ Viajes cargados:', trips);
      if (Array.isArray(trips)) {
        trips.forEach(createTripCard);
      }
    } catch (error) {
      console.error('❌ Error cargando viajes:', error);
    }
  }

  window.toggleTheme = function() {
    var html = document.documentElement;
    var current = html.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
  };

  loadTrips();
})();
</script>


</body>
</html>
